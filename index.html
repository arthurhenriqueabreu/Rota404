<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EntregaBot – Simulação Telegram</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="tg-header">
      <div class="bot-avatar">&#128666;</div>
      <div class="bot-info">
        <div class="bot-name">EntregaBot</div>
        <div class="bot-status">&#9679; online</div>
      </div>
      <div class="header-icons">
        <span>&#128269;</span>
        <span>&#8942;</span>
      </div>
    </header>

    <main class="messages-wrap" id="messages">
      <div class="date-divider"><span>Hoje</span></div>

      <div class="bubble-row bot">
        <div class="bubble-avatar">&#128666;</div>
        <div>
          <div class="bubble">
            Olá! &#128075; Sou o <strong>EntregaBot</strong>, seu assistente de logística.<br><br>
            Digite <strong>/novaentrega</strong> para iniciar o cálculo de uma nova rota de entregas.
          </div>
          <div class="bubble-time">agora</div>
        </div>
      </div>
    </main>

    <div class="hint-bar">Simulação — digite <span>/novaentrega</span> para começar</div>

    <div class="input-area">
      <span class="input-attach">&#128206;</span>
      <input type="text" class="input-field" id="userInput" placeholder="Mensagem" autocomplete="off">
      <button class="send-btn" id="sendBtn" type="button" aria-label="Enviar mensagem">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
